services:
  # ── PostgreSQL 16 ──────────────────────────────────────
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: regwatch
      POSTGRES_USER: regwatch
      POSTGRES_PASSWORD: regwatch_secret
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U regwatch" ]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Redis 7 ────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Zookeeper ──────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  # ── Kafka ──────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: [ "CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI Application ────────────────────────────────
  api:
    build: .
    ports:
      - "8001:8000"
    environment:
      DATABASE_URL: postgresql://regwatch:regwatch_secret@db:5432/regwatch
      REDIS_URL: redis://redis:6379/0
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    extra_hosts:
      - "mock-website.local:host-gateway"
      # Lets the API reach the host-bound Keycloak port (8085) when
      # validating JWTs. Frontend uses http://localhost:8085 directly.
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/opt/app

  # ── Celery Worker ──────────────────────────────────────
  worker:
    build: .
    command: celery -A app.celery_app:celery worker --loglevel=info --beat
    environment:
      DATABASE_URL: postgresql://regwatch:regwatch_secret@db:5432/regwatch
      REDIS_URL: redis://redis:6379/0
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      # If dof.gob.mx fails with CERTIFICATE_VERIFY_FAILED (broken server chain), set:
      # INGEST_TLS_SKIP_VERIFY_HOST_SUFFIXES: "dof.gob.mx"
    extra_hosts:
      - "mock-website.local:host-gateway"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/opt/app

  # ── Flower Monitoring ──────────────────────────────────
  flower:
    build: .
    command: celery -A app.celery_app:celery flower --port=5555
    ports:
      - "5555:5555"
    environment:
      REDIS_URL: redis://redis:6379/0
      FLOWER_UNAUTHENTICATED_API: "true"
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - .:/opt/app

  # ── Keycloak (auth) ────────────────────────────────────
  # Dev-mode Keycloak with the regwatch realm pre-imported. The
  # frontend redirects users here for login; the backend validates
  # JWTs against this issuer's JWKS.
  # Admin console: http://localhost:8085  (admin / admin)
  # Realm:        regwatch
  # Test users:   ahmed / test123, sarah / test123
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    command: ["start-dev", "--import-realm", "--http-port=8080"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HEALTH_ENABLED: "true"
    ports:
      - "8085:8080"
    volumes:
      - ./infra/keycloak:/opt/keycloak/data/import:ro
      - keycloak_data:/opt/keycloak/data
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080 && echo -e 'GET /realms/regwatch HTTP/1.1\\nHost: localhost\\n\\n' >&3 && head -1 <&3 | grep -E '200|301|302' >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  # ── Mock Regulatory Server (simple RSS + old regulations) ─
  mock-server:
    build: ./mock_server
    ports:
      - "9000:9000"
    volumes:
      - ./mock_server/data:/data

  # ── Mock Regulatory Website (ATCA — crawler target) ────
  mock-website:
    build: ./mock-website
    ports:
      - "3001:3001"
    environment:
      DATA_DIR: /data
    volumes:
      - ./mock-website/mock_server/data:/data

volumes:
  pgdata:
  keycloak_data:
