<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Match the mobile-browser chrome to the page background so the
         status bar / address bar / tab bar don't read as a different
         surface. Two entries: light mode resolves to near-white, dark
         mode to the same near-black we use in CSS variables. -->
    <meta name="theme-color" content="#fafafa" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#2f2f2f" media="(prefers-color-scheme: dark)" />
    <link rel="icon" type="image/jpeg" href="/src/assets/logo-icon.jpeg" />

    <!-- Inter via Google Fonts. Variable font, weights 400/500/600/700.
         Preconnect cuts ~100ms off the first paint. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <title>MyTower — Regulatory Alerts</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
